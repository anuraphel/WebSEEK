version: '3.8'

services:
  db:
    image: postgres:15
    container_name: search_engine_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password123}
      POSTGRES_DB: ${DB_NAME:-search_engine}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7
    container_name: search_engine_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  crawler:
    build: ./services/crawler
    container_name: search_engine_crawler
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-password123}@db:5432/${DB_NAME:-search_engine}
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./services/crawler:/app

  processor:
    build: ./services/processor
    container_name: search_engine_processor
    depends_on:
      - db
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-admin}:${DB_PASSWORD:-password123}@db:5432/${DB_NAME:-search_engine}
    volumes:
      - ./services/processor:/app

volumes:
  postgres_data:
  redis_data:
